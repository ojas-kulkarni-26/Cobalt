<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cobalt">
  <meta name="theme-color" content="#4F7EFF">
  <link rel="apple-touch-icon" href="/Cobalt/assets/icon-192.png">
  <title>Cobalt</title>
  <link rel="manifest" href="/Cobalt/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Instrument+Serif:ital@0;1&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <!-- highlight.js -->
  <link rel="stylesheet" id="hljs-theme-dark" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <link rel="stylesheet" id="hljs-theme-light" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" disabled />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <!-- marked -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <!-- libsql (turso) -->
  <script type="module" src="js/app.js"></script>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/editor.css" />
  <link rel="stylesheet" href="css/ui.css" />
</head>
<body>

<!-- SVG Icon Sprite -->

  </symbol>
  <symbol id="icon-tag" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

  <symbol id="icon-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
  </symbol>

    <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
  </symbol>
  <symbol id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

  </symbol>
  <symbol id="icon-drag" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="9" cy="5" r="1" fill="currentColor"/><circle cx="9" cy="12" r="1" fill="currentColor"/><circle cx="9" cy="19" r="1" fill="currentColor"/>
    <circle cx="15" cy="5" r="1" fill="currentColor"/><circle cx="15" cy="12" r="1" fill="currentColor"/><circle cx="15" cy="19" r="1" fill="currentColor"/>
  </symbol>
  <symbol id="icon-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

  </symbol>
  <symbol id="icon-chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <polyline points="9 18 15 12 9 6"/>

  <symbol id="icon-chevron-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <polyline points="6 9 12 15 18 9"/>
  </symbol>
  <symbol id="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <polyline points="20 6 9 17 4 12"/>
  </symbol>
  <symbol id="icon-link" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
  </symbol>
  <symbol id="icon-image" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
  </symbol>
  <symbol id="icon-table" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/>
  </symbol>
  <symbol id="icon-code" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
  </symbol>
  <symbol id="icon-quote" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/>

    <line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/>
  </symbol>

    <polyline points="9 18 15 12 9 6"/>

    <line x1="3" y1="12" x2="21" y2="12"/>
  </symbol>
  <symbol id="icon-callout" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
  </symbol>
  <symbol id="icon-sync" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
  </symbol>
  <symbol id="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </symbol>
  <symbol id="icon-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
  </symbol>
  <symbol id="icon-more" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="12" cy="5" r="1" fill="currentColor"/><circle cx="12" cy="12" r="1" fill="currentColor"/><circle cx="12" cy="19" r="1" fill="currentColor"/>
  </symbol>
  <symbol id="icon-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
  </symbol>
</svg>

<!-- Sidebar Open FAB (shown when sidebar is collapsed on desktop) -->
<button id="sidebar-open-fab" class="sidebar-open-fab hidden" title="Open sidebar">
  <svg width="15" height="15"><use href="#icon-sidebar"/></svg>
</button>

<!-- App Shell -->
<div id="app">
  <!-- Setup Screen (shown if no token) -->
  <div id="setup-screen" class="setup-screen hidden">
    <div class="setup-card">
      <div class="setup-logo">
        <svg width="40" height="40"><use href="#icon-cobalt"/></svg>
        <span>cobalt</span>
      </div>
      <h2>Connect your database</h2>
      <p>Enter your Turso auth token to start syncing. This is stored only in your browser.</p>
      <div class="setup-field">
        <label>Auth Token</label>
        <input type="password" id="setup-token" placeholder="eyJhbGciOiJFZERTQS..." autocomplete="off" />
      </div>
      <button class="btn-primary" id="setup-connect">Connect & Launch</button>
      <p class="setup-note">URL: <code>https://cobalt-ojaskul26.aws-ap-south-1.turso.io</code></p>
    </div>
  </div>

  <!-- Main Layout -->
  <div id="main-layout" class="main-layout hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <svg width="20" height="20"><use href="#icon-cobalt"/></svg>
          <span>cobalt</span>
        </div>
        <div class="sidebar-header-actions">
          <button class="icon-btn" id="theme-toggle" title="Toggle theme">
            <svg width="16" height="16"><use href="#icon-moon" id="theme-icon"/></svg>
          </button>
          <button class="icon-btn" id="sidebar-close-btn" title="Close sidebar">
            <svg width="16" height="16"><use href="#icon-sidebar"/></svg>
          </button>
        </div>
      </div>

      <div class="sidebar-search">
        <button class="search-trigger" id="search-trigger">
          <svg width="14" height="14"><use href="#icon-search"/></svg>
          <span>Search notes...</span>
          <kbd>⌘K</kbd>
        </button>
      </div>

      <div class="sidebar-actions">
        <button class="btn-new-note" id="new-note-btn">
          <svg width="14" height="14"><use href="#icon-new"/></svg>
          New note
        </button>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <span class="nav-section-label">Notes</span>
          <div id="notes-list" class="notes-list"></div>
        </div>

        <div class="nav-section" id="tags-section">
          <span class="nav-section-label">
            <svg width="12" height="12"><use href="#icon-tag"/></svg>
            Tags
          </span>
          <div id="tags-list" class="tags-list"></div>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="sync-status" id="sync-status">
          <svg width="12" height="12"><use href="#icon-sync"/></svg>
          <span id="sync-label">Synced</span>
        </div>
        <button class="icon-btn" id="settings-btn" title="Settings">
          <svg width="16" height="16"><use href="#icon-settings"/></svg>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main id="content" class="content">
      <!-- Mobile topbar -->
      <div class="mobile-topbar" id="mobile-topbar">
        <button class="icon-btn" id="mobile-menu-btn">
          <svg width="20" height="20"><use href="#icon-menu"/></svg>
        </button>
        <span id="mobile-note-title" class="mobile-title">cobalt</span>
        <button class="icon-btn" id="mobile-new-btn">
          <svg width="20" height="20"><use href="#icon-new"/></svg>
        </button>
      </div>

      <!-- Empty state -->
      <div id="empty-state" class="empty-state">
        <div class="empty-state-inner">
          <svg width="64" height="64" class="empty-logo"><use href="#icon-cobalt"/></svg>
          <h1>cobalt</h1>
          <p>Your personal knowledge workspace.</p>
          <button class="btn-primary" id="empty-new-btn">
            <svg width="16" height="16"><use href="#icon-new"/></svg>
            Create a new note
          </button>
        </div>
      </div>

      <!-- Note Editor -->
      <div id="note-editor" class="note-editor hidden">
        <div class="editor-header">
          <div class="note-meta">
            <div class="note-icon-btn" id="note-icon-btn" title="Set icon">
              <span id="note-icon-display">📄</span>
            </div>
          </div>
          <div class="editor-header-actions">
            <div class="note-tags-row" id="note-tags-row"></div>
            <button class="icon-btn" id="note-more-btn" title="More options">
              <svg width="16" height="16"><use href="#icon-more"/></svg>
            </button>
          </div>
        </div>

        <div class="editor-scroll-area">
          <div class="editor-inner">
            <div class="note-title-wrap">
              <div
                id="note-title"
                class="note-title"
                contenteditable="true"
                data-placeholder="Untitled"
                spellcheck="false"
              ></div>
              <div class="note-title-meta" id="note-title-meta"></div>
            </div>

            <div id="blocks-container" class="blocks-container"></div>

            <!-- Block adder at bottom -->
            <div class="editor-bottom-adder" id="editor-bottom-adder">
              <button class="bottom-add-btn" id="bottom-add-btn">
                <svg width="14" height="14"><use href="#icon-plus"/></svg>
                <span>Add block</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Command Palette -->
<div id="command-palette" class="command-palette hidden" role="dialog" aria-label="Command palette">
  <div class="cp-backdrop"></div>
  <div class="cp-panel">
    <div class="cp-search-row">
      <svg width="16" height="16"><use href="#icon-search"/></svg>
      <input type="text" id="cp-input" placeholder="Search notes or type a command..." autocomplete="off" />
      <kbd class="cp-esc">Esc</kbd>
    </div>
    <div id="cp-results" class="cp-results"></div>
  </div>
</div>

<!-- Block Type Menu -->
<div id="block-type-menu" class="block-type-menu hidden" role="menu">
  <div class="btm-search">
    <input type="text" id="btm-input" placeholder="Filter blocks..." autocomplete="off" />
  </div>
  <div id="btm-list" class="btm-list"></div>
</div>

<!-- Context Menu -->
<div id="context-menu" class="context-menu hidden" role="menu"></div>

<!-- Emoji Picker (simple) -->
<div id="emoji-picker" class="emoji-picker hidden"></div>

<!-- Tag Input Popup -->
<div id="tag-popup" class="tag-popup hidden">
  <input type="text" id="tag-input" placeholder="Add tag..." autocomplete="off" />
  <div id="tag-suggestions" class="tag-suggestions"></div>
</div>

<!-- Settings Modal -->
<div id="settings-modal" class="modal hidden" role="dialog">
  <div class="modal-backdrop"></div>
  <div class="modal-panel">
    <div class="modal-header">
      <h3>Settings</h3>
      <button class="icon-btn" id="settings-close">
        <svg width="16" height="16"><use href="#icon-close"/></svg>
      </button>
    </div>
    <div class="modal-body" id="settings-body"></div>
  </div>
</div>

<!-- Toast Container -->
<div id="toast-container" class="toast-container"></div>

</body>
</html>
